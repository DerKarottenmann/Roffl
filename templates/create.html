{% extends "base.html" %}

{% block title %}Create{% endblock %}

{% block content %}
{% if not session.logged_in %}
    <div class="content">
        <h1>Unauthorized</h1>
        <p>You must be logged in to create content.</p>
        <a class="prlink" href="{{ url_for('login') }}">Login here</a>
    </div>
{% else %}
<div class="create-container">
   
    <form method="POST" action="{{ url_for('create') }}" enctype="multipart/form-data">
        <h1>Create</h1>
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
        <br>
        <label for="text">Text:</label>
        <textarea id="text" name="text" minlength="25" required></textarea>
        <br>
        <label for="images">Upload Images:</label>
        <input type="file" id="images" name="images" accept="image/*" multiple>
        <br>
        <input type="submit" value="Create">
        <a class="prlink" href="{{ url_for('Mainpage') }}">Go back to homepage</a>
    </form>
    
</div>
{% endif %}
{% endblock %}
