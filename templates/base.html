<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Roffl{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style/main.css') }}">
</head>

<body>
    <!-- Taskleiste -->
    <div class="top_panel">
        <img class="logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Roffl Logo">

        <!-- rechtsgruppierung -->
        <div class="top_actions">
            <button class="create_button" onclick="window.location.href='/create'" aria-label="Create">+</button>
            <a class="prlink" href="{{ url_for('signup') }}">Sign Up</a>
            {% if session.logged_in %}
                <span>Welcome, {{ session.username }}!</span>
                <a class="prlink" href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a class="prlink" href="{{ url_for('login') }}">Login</a>
            {% endif %}
        </div>

    </div>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
